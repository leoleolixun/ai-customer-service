name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: Full Git commit to validate as a release candidate
        required: true
        type: string

jobs:
  candidate:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.resolve.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_ref || github.sha }}
      - id: resolve
        name: Resolve and record the tested commit
        env:
          REQUESTED_REF: ${{ inputs.candidate_ref || github.sha }}
          WORKFLOW_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ ! "$REQUESTED_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "candidate_ref must be a full 40-character lowercase Git commit" >&2
            exit 1
          fi
          commit="$(git rev-parse HEAD)"
          if [[ "$commit" != "$REQUESTED_REF" ]]; then
            echo "checked out $commit instead of requested candidate $REQUESTED_REF" >&2
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          printf '{"requested_ref":"%s","tested_commit":"%s","workflow_sha":"%s","event":"%s"}\n' \
            "$REQUESTED_REF" "$commit" "$WORKFLOW_SHA" "$EVENT_NAME" \
            > candidate-provenance.json
          cat candidate-provenance.json
      - uses: actions/upload-artifact@v4
        with:
          name: candidate-provenance
          path: candidate-provenance.json
          if-no-files-found: error
          retention-days: 30

  quality:
    needs: candidate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: ai_customer_service_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_customer_service_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_customer_service_test
      TEST_POSTGRES_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_customer_service_test
      APP_REDIS_URL: redis://localhost:6379/15
      APP_JWT_SECRET: ci-jwt-secret-with-at-least-thirty-two-characters
      APP_CREDENTIAL_PEPPER: ci-credential-pepper-with-at-least-thirty-two-characters
      APP_ENCRYPTION_KEY: 6A0dKlz6yUenVGLWQVCuMBzK5z6PumvV1-0wI0Z7lGQ=
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-groups --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app scripts examples tests
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run pytest --junitxml=reports/pytest.xml
      - run: uv run python scripts/check_secrets.py
      - run: APP_ENV_FILE=.env.example docker compose --env-file .env.example -f docker-compose.yml config --quiet
      - run: docker compose --env-file .env.production.example -f deploy/compose.production.yml config --quiet
      - run: uv run python scripts/export_openapi.py
      - run: git diff --exit-code -- openapi/openapi.json
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-report
          path: |
            reports/pytest.xml
            openapi/openapi.json
          if-no-files-found: error
          retention-days: 14

  component-integration:
    needs: candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV_FILE: .env.example
      COMPOSE_PROJECT_NAME: ai-cs-component-ci
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
      - name: Prepare report directory and one-time demo password
        run: |
          mkdir -p reports
          echo "DEMO_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"
      - name: Build and migrate the real component stack
        run: |
          set -euo pipefail
          docker compose --env-file .env.example build api worker beat
          docker compose --env-file .env.example up -d postgres redis minio minio-init
          docker compose --env-file .env.example run --rm -T api alembic upgrade head
      - name: Seed two isolated tenants and start API and Worker
        run: |
          set -euo pipefail
          printf '%s\n' "$DEMO_PASSWORD" \
            | docker compose --env-file .env.example run --rm -T api \
                python scripts/seed_demo.py --password-stdin >/dev/null
          docker compose --env-file .env.example up -d api worker beat
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8000/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker compose --env-file .env.example logs --no-color api
          exit 1
      - name: Run two-tenant HTTP and real component isolation probes
        run: |
          set -euo pipefail
          printf '%s\n' "$DEMO_PASSWORD" \
            | docker compose --env-file .env.example exec -T api \
                python scripts/smoke_v1.py \
                  --base-url http://127.0.0.1:8000 \
                  --password-stdin \
            | tee reports/two-tenant-smoke.json
          docker compose --env-file .env.example exec -T api \
            python scripts/component_isolation_probe.py \
            | tee reports/component-isolation.json
      - name: Verify queued Worker recovery and idempotent replay
        run: |
          set -euo pipefail
          docker compose --env-file .env.example stop worker
          docker compose --env-file .env.example exec -T api \
            python scripts/worker_recovery_probe.py enqueue \
              --state /tmp/ci-worker-recovery.json \
            | tee reports/worker-enqueue.json
          docker compose --env-file .env.example up -d worker
          docker compose --env-file .env.example exec -T api \
            python scripts/worker_recovery_probe.py verify \
              --state /tmp/ci-worker-recovery.json \
              --timeout 120 \
              --replay \
            | tee reports/worker-recovery.json
      - name: Capture component logs after failure
        if: ${{ failure() }}
        run: >-
          docker compose --env-file .env.example logs --no-color
          postgres redis minio api worker beat > reports/component-services.log 2>&1
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: component-integration-report
          path: reports/
          if-no-files-found: error
          retention-days: 14
      - name: Remove component stack
        if: ${{ always() }}
        run: docker compose --env-file .env.example down --volumes --remove-orphans

  frontend-quality:
    needs: candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:frontend
      - run: npm run build
      - run: python scripts/check_secrets.py
      - uses: actions/upload-artifact@v4
        with:
          name: release-web-assets
          path: |
            apps/admin/dist/
            apps/demo/dist/
            packages/sdk/dist/
            packages/widget/dist/
          if-no-files-found: error
          retention-days: 14

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [candidate, frontend-quality]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.candidate.outputs.commit }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
